<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stay on Log!</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #0d1b2a 0%, #1b2838 40%, #1a2a3a 100%);
            color: white;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        /* === UI LAYER === */
        #ui-layer {
            position: absolute;
            top: 5%;
            text-align: center;
            z-index: 10;
            width: 100%;
        }

        #player-name {
            font-size: 16px;
            opacity: 0.7;
            margin-bottom: 4px;
            cursor: pointer;
            letter-spacing: 0.5px;
        }

        #player-name:hover {
            opacity: 1;
            text-decoration: underline;
        }

        #score-display {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        #high-score-display {
            font-size: 14px;
            opacity: 0.5;
            margin-top: 2px;
        }

        #new-record {
            font-size: 20px;
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
            display: none;
            animation: recordPulse 0.6s ease-in-out infinite alternate;
        }

        @keyframes recordPulse {
            from {
                transform: scale(0.9);
                opacity: 0.7;
            }

            to {
                transform: scale(1.1);
                opacity: 1;
            }
        }

        #status-text {
            font-size: 22px;
            margin-top: 4px;
            opacity: 0.9;
            font-weight: 600;
        }

        #direction-arrow {
            font-size: 48px;
            margin-top: 2px;
            display: none;
            animation: pulseArrow 0.8s ease-in-out infinite alternate;
        }

        @keyframes pulseArrow {
            from {
                opacity: 0.6;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1.1);
            }
        }

        #speed-indicator {
            font-size: 14px;
            opacity: 0.6;
            margin-top: 4px;
            display: none;
        }

        #start-btn {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 22px;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            margin-top: 16px;
            box-shadow: 0 6px 20px rgba(39, 174, 96, 0.4);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            letter-spacing: 2px;
        }

        #start-btn:active {
            transform: scale(0.95);
            box-shadow: 0 3px 10px rgba(39, 174, 96, 0.3);
        }

        /* === COUNTDOWN OVERLAY === */
        #countdown-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 20, 30, 0.92);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #countdown-overlay.active {
            display: flex;
        }

        #countdown-text {
            font-size: 18px;
            opacity: 0.85;
            margin-bottom: 30px;
            text-align: center;
            padding: 0 20px;
        }

        #countdown-number {
            font-size: 120px;
            font-weight: 900;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.3);
            animation: countPop 0.5s ease-out;
        }

        @keyframes countPop {
            0% {
                transform: scale(2);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        #phone-icon {
            width: 60px;
            height: 100px;
            border: 4px solid white;
            border-radius: 14px;
            margin-top: 30px;
            background: transparent;
            animation: rotatePhone 2s linear infinite;
            position: relative;
        }

        #phone-icon::after {
            content: '';
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 3px;
            background: white;
            border-radius: 2px;
        }

        @keyframes rotatePhone {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(-360deg);
            }
        }

        /* === GAME AREA === */
        #game-area {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* === GAME CONTAINER === */
        #game-container {
            position: relative;
            width: 280px;
            height: 280px;
            isolation: isolate;
            z-index: 5;
        }

        #log-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 280px;
            height: 280px;
            z-index: 1;
            will-change: transform;
        }

        #log-svg {
            display: block;
        }

        #player-orbit {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            will-change: transform;
        }

        /* === SIDE-VIEW RUNNING STICKMAN === */
        #player {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 44px;
            height: 60px;
            opacity: 0;
            transition: none;
        }

        #player.visible {
            opacity: 1;
        }

        #player.falling {
            animation: fallDown 0.5s ease-in forwards;
        }

        @keyframes fallDown {
            0% {
                top: -300px;
                opacity: 1;
            }

            70% {
                top: -20px;
            }

            85% {
                top: -30px;
            }

            100% {
                top: -25px;
                opacity: 1;
            }
        }

        /* Running leg animation */
        .leg-back {
            animation: legSwingBack 0.35s ease-in-out infinite alternate;
            transform-origin: 22px 32px;
        }

        .leg-front {
            animation: legSwingFront 0.35s ease-in-out infinite alternate;
            transform-origin: 22px 32px;
        }

        .arm-back {
            animation: armSwingBack 0.35s ease-in-out infinite alternate;
            transform-origin: 22px 20px;
        }

        .arm-front {
            animation: armSwingFront 0.35s ease-in-out infinite alternate;
            transform-origin: 22px 20px;
        }

        @keyframes legSwingBack {
            0% {
                transform: rotate(-25deg);
            }

            100% {
                transform: rotate(25deg);
            }
        }

        @keyframes legSwingFront {
            0% {
                transform: rotate(25deg);
            }

            100% {
                transform: rotate(-25deg);
            }
        }

        @keyframes armSwingBack {
            0% {
                transform: rotate(20deg);
            }

            100% {
                transform: rotate(-20deg);
            }
        }

        @keyframes armSwingFront {
            0% {
                transform: rotate(-20deg);
            }

            100% {
                transform: rotate(20deg);
            }
        }

        /* === WATER === */
        #water-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 35%;
            z-index: 2;
            overflow: hidden;
            pointer-events: none;
        }

        .wave {
            position: absolute;
            width: 200%;
            left: -50%;
        }

        .wave-back {
            top: 15px;
            animation: waveMove 4s ease-in-out infinite;
        }

        .wave-front {
            top: 0;
            animation: waveMove 3s ease-in-out infinite reverse;
        }

        @keyframes waveMove {

            0%,
            100% {
                transform: translateX(0);
            }

            50% {
                transform: translateX(5%);
            }
        }

        #water-body {
            position: absolute;
            top: 35px;
            left: 0;
            width: 100%;
            height: calc(100% - 35px);
            background: linear-gradient(180deg, #1a6eb5 0%, #0d3d6b 50%, #082040 100%);
        }

        /* === SPLASH === */
        #splash {
            position: absolute;
            z-index: 15;
            display: none;
            pointer-events: none;
        }

        #splash.active {
            display: block;
            animation: splashAnim 0.6s ease-out forwards;
        }

        @keyframes splashAnim {
            0% {
                transform: scale(0.3);
                opacity: 1;
            }

            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        /* === FALL INTO WATER === */
        #falling-player {
            position: absolute;
            z-index: 12;
            display: none;
            pointer-events: none;
        }

        #falling-player.active {
            display: block;
            animation: fallIntoWater 0.8s ease-in forwards;
        }

        @keyframes fallIntoWater {
            0% {
                opacity: 1;
            }

            80% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }

        /* === DIRECTION CHANGE WARNING === */
        #direction-warning {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            font-weight: 900;
            color: #ffd93d;
            text-shadow: 0 0 20px rgba(255, 217, 61, 0.5);
            z-index: 50;
            display: none;
            animation: flashWarn 0.3s ease-in-out infinite alternate;
        }

        @keyframes flashWarn {
            from {
                opacity: 0.4;
            }

            to {
                opacity: 1;
            }
        }

        /* === NICKNAME OVERLAY === */
        #nickname-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 20, 30, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            gap: 20px;
        }

        #nickname-overlay.active {
            display: flex;
        }

        #nickname-overlay h2 {
            font-size: 28px;
            font-weight: 700;
            margin: 0;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.15);
        }

        #nickname-overlay p {
            font-size: 15px;
            opacity: 0.6;
            margin: 0;
        }

        #nickname-input {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.25);
            border-radius: 12px;
            padding: 14px 24px;
            font-size: 20px;
            color: white;
            text-align: center;
            outline: none;
            width: 260px;
            max-width: 80vw;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        #nickname-input:focus {
            border-color: rgba(255, 255, 255, 0.5);
        }

        #nickname-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        #nickname-save-btn {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            border: none;
            padding: 14px 36px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(39, 174, 96, 0.4);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            letter-spacing: 1px;
        }

        #nickname-save-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 8px rgba(39, 174, 96, 0.3);
        }

        #debug {
            position: absolute;
            bottom: 10px;
            font-size: 12px;
            opacity: 0.4;
            display: none;
        }
    </style>
</head>

<body>

    <div id="ui-layer">
        <div id="player-name" onclick="showNicknameOverlay()"></div>
        <div id="score-display">Очки: 0</div>
        <div id="high-score-display"></div>
        <div id="new-record">⭐ Новый рекорд! ⭐</div>
        <div id="status-text">Нажми старт</div>
        <div id="direction-arrow"></div>
        <div id="speed-indicator"></div>
        <button id="start-btn" onclick="handleStartClick()">СТАРТ</button>
    </div>

    <!-- Nickname overlay -->
    <div id="nickname-overlay">
        <h2>👋 Привет!</h2>
        <p>Как тебя зовут?</p>
        <input id="nickname-input" type="text" placeholder="Введи ник" maxlength="16" autocomplete="off">
        <button id="nickname-save-btn" onclick="saveNickname()">Играть!</button>
    </div>

    <div id="game-area">
        <div id="game-container">
            <!-- Log wrapper for rotation -->
            <div id="log-wrapper">
                <svg id="log-svg" width="280" height="280" viewBox="0 0 280 280">
                    <circle cx="140" cy="140" r="135" fill="#5a3a1a" stroke="#3d2510" stroke-width="2" />
                    <circle cx="140" cy="140" r="130" fill="#6b4423" />
                    <circle cx="140" cy="140" r="110" fill="#DEB887" />
                    <circle cx="140" cy="140" r="95" fill="none" stroke="#c4a06a" stroke-width="1.5" opacity="0.6" />
                    <circle cx="140" cy="140" r="78" fill="none" stroke="#c4a06a" stroke-width="1" opacity="0.5" />
                    <circle cx="140" cy="140" r="60" fill="none" stroke="#c4a06a" stroke-width="1.5" opacity="0.6" />
                    <circle cx="140" cy="140" r="42" fill="none" stroke="#c4a06a" stroke-width="1" opacity="0.5" />
                    <circle cx="140" cy="140" r="25" fill="none" stroke="#c4a06a" stroke-width="1.5" opacity="0.6" />
                    <circle cx="140" cy="140" r="8" fill="#b8935a" />
                    <!-- Knots -->
                    <g>
                        <ellipse cx="140" cy="8" rx="14" ry="8" fill="#4a2a10" stroke="#3d2510" stroke-width="1.5" />
                        <ellipse cx="140" cy="10" rx="9" ry="5" fill="#5a3a1a" />
                        <ellipse cx="140" cy="11" rx="5" ry="3" fill="#6b4423" />
                    </g>
                    <g transform="rotate(90, 140, 140)">
                        <ellipse cx="140" cy="6" rx="18" ry="10" fill="#4a2a10" stroke="#3d2510" stroke-width="1.5" />
                        <ellipse cx="140" cy="9" rx="12" ry="6" fill="#5a3a1a" />
                        <ellipse cx="140" cy="11" rx="6" ry="3" fill="#6b4423" />
                    </g>
                    <g transform="rotate(210, 140, 140)">
                        <ellipse cx="140" cy="10" rx="11" ry="7" fill="#4a2a10" stroke="#3d2510" stroke-width="1.5" />
                        <ellipse cx="140" cy="12" rx="7" ry="4" fill="#5a3a1a" />
                    </g>
                    <g transform="rotate(320, 140, 140)">
                        <ellipse cx="140" cy="12" rx="9" ry="5" fill="#4a2a10" stroke="#3d2510" stroke-width="1.5" />
                        <ellipse cx="140" cy="13" rx="5" ry="3" fill="#5a3a1a" />
                    </g>
                    <circle cx="140" cy="140" r="135" fill="url(#logShadow)" opacity="0.15" />
                    <defs>
                        <radialGradient id="logShadow" cx="40%" cy="35%" r="60%">
                            <stop offset="0%" stop-color="white" />
                            <stop offset="100%" stop-color="black" />
                        </radialGradient>
                    </defs>
                </svg>
            </div>

            <!-- Player orbit -->
            <div id="player-orbit">
                <!-- Side-view running stickman -->
                <svg id="player" viewBox="0 0 44 55" xmlns="http://www.w3.org/2000/svg">
                    <!-- Head -->
                    <circle cx="22" cy="9" r="7.5" fill="#ff5252" stroke="white" stroke-width="2" />
                    <!-- Eye -->
                    <circle cx="26" cy="8" r="1.5" fill="white" />
                    <!-- Mouth -->
                    <path d="M24 12 Q26 14 28 12" fill="none" stroke="white" stroke-width="1" stroke-linecap="round" />
                    <!-- Body (slight lean forward) -->
                    <line x1="22" y1="16" x2="21" y2="32" stroke="white" stroke-width="3" stroke-linecap="round" />
                    <!-- Arms (animated) -->
                    <g class="arm-back">
                        <line x1="22" y1="20" x2="14" y2="28" stroke="white" stroke-width="2.5"
                            stroke-linecap="round" />
                    </g>
                    <g class="arm-front">
                        <line x1="22" y1="20" x2="30" y2="28" stroke="white" stroke-width="2.5"
                            stroke-linecap="round" />
                    </g>
                    <!-- Legs (animated) -->
                    <g class="leg-back">
                        <line x1="21" y1="32" x2="14" y2="46" stroke="white" stroke-width="2.5"
                            stroke-linecap="round" />
                        <line x1="14" y1="46" x2="12" y2="46" stroke="white" stroke-width="2.5"
                            stroke-linecap="round" />
                    </g>
                    <g class="leg-front">
                        <line x1="21" y1="32" x2="28" y2="46" stroke="white" stroke-width="2.5"
                            stroke-linecap="round" />
                        <line x1="28" y1="46" x2="30" y2="46" stroke="white" stroke-width="2.5"
                            stroke-linecap="round" />
                    </g>
                </svg>
            </div>
        </div>

        <!-- Water -->
        <div id="water-container">
            <!-- Wave back layer -->
            <svg class="wave wave-back" viewBox="0 0 1200 60" preserveAspectRatio="none" height="50">
                <path d="M0,30 Q75,5 150,30 T300,30 T450,30 T600,30 T750,30 T900,30 T1050,30 T1200,30 V60 H0 Z"
                    fill="rgba(30,100,180,0.5)" />
            </svg>
            <!-- Wave front layer -->
            <svg class="wave wave-front" viewBox="0 0 1200 60" preserveAspectRatio="none" height="45">
                <path
                    d="M0,25 Q60,0 120,25 T240,25 T360,25 T480,25 T600,25 T720,25 T840,25 T960,25 T1080,25 T1200,25 V60 H0 Z"
                    fill="rgba(40,130,210,0.6)" />
            </svg>
            <div id="water-body"></div>
        </div>

        <!-- Falling player clone (for fall animation) -->
        <svg id="falling-player" width="44" height="55" viewBox="0 0 44 55" xmlns="http://www.w3.org/2000/svg">
            <circle cx="22" cy="9" r="7.5" fill="#ff5252" stroke="white" stroke-width="2" />
            <circle cx="26" cy="8" r="1.5" fill="white" />
            <line x1="22" y1="16" x2="21" y2="32" stroke="white" stroke-width="3" stroke-linecap="round" />
            <line x1="22" y1="20" x2="14" y2="28" stroke="white" stroke-width="2.5" stroke-linecap="round" />
            <line x1="22" y1="20" x2="30" y2="28" stroke="white" stroke-width="2.5" stroke-linecap="round" />
            <line x1="21" y1="32" x2="14" y2="46" stroke="white" stroke-width="2.5" stroke-linecap="round" />
            <line x1="21" y1="32" x2="28" y2="46" stroke="white" stroke-width="2.5" stroke-linecap="round" />
        </svg>

        <!-- Splash effect -->
        <svg id="splash" width="80" height="60" viewBox="0 0 80 60" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="40" cy="45" rx="35" ry="8" fill="rgba(100,180,255,0.4)" />
            <path d="M20,40 Q15,20 20,10" fill="none" stroke="rgba(100,180,255,0.8)" stroke-width="3"
                stroke-linecap="round" />
            <path d="M35,38 Q33,15 38,5" fill="none" stroke="rgba(100,180,255,0.9)" stroke-width="3"
                stroke-linecap="round" />
            <path d="M50,38 Q52,18 48,8" fill="none" stroke="rgba(100,180,255,0.8)" stroke-width="3"
                stroke-linecap="round" />
            <path d="M60,40 Q65,22 58,12" fill="none" stroke="rgba(100,180,255,0.7)" stroke-width="3"
                stroke-linecap="round" />
            <!-- Droplets -->
            <circle cx="18" cy="8" r="3" fill="rgba(100,180,255,0.7)" />
            <circle cx="40" cy="3" r="2.5" fill="rgba(100,180,255,0.8)" />
            <circle cx="55" cy="6" r="3" fill="rgba(100,180,255,0.6)" />
            <circle cx="62" cy="10" r="2" fill="rgba(100,180,255,0.5)" />
        </svg>
    </div>

    <!-- Countdown overlay -->
    <div id="countdown-overlay">
        <div id="countdown-text">Готовься крутить телефон!</div>
        <div id="countdown-number">3</div>
        <div id="phone-icon"></div>
    </div>

    <!-- Direction change warning -->
    <div id="direction-warning">⚠ СМЕНА!</div>

    <div id="debug">Debug info</div>

    <script>
        // === GAME VARIABLES ===
        let isPlaying = false;
        let score = 0;
        let startTime = 0;
        let highScore = parseInt(localStorage.getItem('stayOnLog_highScore')) || 0;
        let playerName = localStorage.getItem('stayOnLog_playerName') || '';

        // Physics
        let logAngle = 0;
        let logSpeed = 0.8;
        let logDirection = 1;
        let userAngle = 0;
        let smoothedDelta = 0;
        let rawLastAngle = null;

        // Direction/speed change timers
        let nextChangeTime = 0;
        const MIN_CHANGE_INTERVAL = 5000;
        const MAX_CHANGE_INTERVAL = 10000;
        const MIN_SPEED = 0.3;
        const MAX_SPEED = 2.5;

        // Low-pass filter
        const SMOOTH_ALPHA = 0.15;

        // DOM
        const logWrapper = document.getElementById('log-wrapper');
        const orbitEl = document.getElementById('player-orbit');
        const playerEl = document.getElementById('player');
        const scoreEl = document.getElementById('score-display');
        const highScoreEl = document.getElementById('high-score-display');
        const newRecordEl = document.getElementById('new-record');
        const statusEl = document.getElementById('status-text');
        const arrowEl = document.getElementById('direction-arrow');
        const speedEl = document.getElementById('speed-indicator');
        const startBtn = document.getElementById('start-btn');
        const debugEl = document.getElementById('debug');
        const countdownOverlay = document.getElementById('countdown-overlay');
        const countdownNumber = document.getElementById('countdown-number');
        const dirWarning = document.getElementById('direction-warning');
        const fallingPlayerEl = document.getElementById('falling-player');
        const splashEl = document.getElementById('splash');
        const gameContainer = document.getElementById('game-container');
        const waterContainer = document.getElementById('water-container');
        const playerNameEl = document.getElementById('player-name');
        const nicknameOverlay = document.getElementById('nickname-overlay');
        const nicknameInput = document.getElementById('nickname-input');

        // Show high score and nickname on load
        updateHighScoreDisplay();
        updatePlayerNameDisplay();

        // === MAIN GAME LOOP ===
        function gameLoop() {
            if (!isPlaying) return;

            // 1. Rotate the log
            logAngle += logSpeed * logDirection;
            logWrapper.style.transform = `rotate(${logAngle}deg)`;

            // 2. Player position
            let playerPosition = logAngle + userAngle;
            orbitEl.style.transform = `rotate(${playerPosition}deg)`;

            // 3. Score
            let now = Date.now();
            score = Math.floor((now - startTime) / 100);
            scoreEl.innerText = "Очки: " + score;

            // Check for new record during gameplay
            if (score > highScore) {
                newRecordEl.style.display = 'block';
            }

            // 4. Direction/speed change
            if (now >= nextChangeTime) {
                scheduleNextChange();
                changeDirectionOrSpeed();
            }

            // 5. Warning before change
            if (nextChangeTime - now < 1500 && nextChangeTime - now > 0) {
                dirWarning.style.display = 'block';
            } else {
                dirWarning.style.display = 'none';
            }

            // 6. Check loss
            let normPos = ((playerPosition % 360) + 540) % 360 - 180;
            if (normPos > 90 || normPos < -90) {
                gameOver(normPos);
                return;
            }

            requestAnimationFrame(gameLoop);
        }

        // === ACCELEROMETER ===
        function handleMotion(event) {
            let x = event.accelerationIncludingGravity.x;
            let y = event.accelerationIncludingGravity.y;

            let rad = Math.atan2(y, x);
            let deg = rad * (180 / Math.PI) - 90;

            if (rawLastAngle !== null) {
                let delta = deg - rawLastAngle;
                if (delta < -180) delta += 360;
                if (delta > 180) delta -= 360;

                smoothedDelta = smoothedDelta * (1 - SMOOTH_ALPHA) + delta * SMOOTH_ALPHA;
                userAngle += smoothedDelta;
            }

            rawLastAngle = deg;
        }

        // === DIRECTION / SPEED ===
        function scheduleNextChange() {
            let interval = MIN_CHANGE_INTERVAL + Math.random() * (MAX_CHANGE_INTERVAL - MIN_CHANGE_INTERVAL);
            nextChangeTime = Date.now() + interval;
        }

        // Returns speed percent 0-100 from actual speed value
        function getSpeedPercent(speed) {
            return ((speed - MIN_SPEED) / (MAX_SPEED - MIN_SPEED)) * 100;
        }

        function changeDirectionOrSpeed() {
            let rand = Math.random();
            let wantsReverse = rand < 0.4 || rand >= 0.7;
            let wantsSpeedChange = rand >= 0.4;

            let newSpeed = logSpeed;
            let newDirection = logDirection;

            // Determine new speed
            if (wantsSpeedChange) {
                newSpeed = MIN_SPEED + Math.random() * (MAX_SPEED - MIN_SPEED);
            }

            // Determine new direction
            if (wantsReverse) {
                newDirection = logDirection * -1;
            }

            // === DIFFICULTY BALANCE ===
            if (score < 400) {
                // Phase 1 (0-399): cap speed at 50%
                let maxSpeedPhase1 = MIN_SPEED + (MAX_SPEED - MIN_SPEED) * 0.5;
                if (newSpeed > maxSpeedPhase1) {
                    newSpeed = MIN_SPEED + Math.random() * (maxSpeedPhase1 - MIN_SPEED);
                }
            } else if (score < 800) {
                // Phase 2 (400-799): block high-speed reversal combos
                // If reversing AND both old and new speed > 75%, re-roll new speed lower
                let threshold75 = MIN_SPEED + (MAX_SPEED - MIN_SPEED) * 0.75;
                let oldSpeedHigh = logSpeed > threshold75;
                let newSpeedHigh = newSpeed > threshold75;
                if (newDirection !== logDirection && oldSpeedHigh && newSpeedHigh) {
                    // Re-roll speed to be within 0-75%
                    newSpeed = MIN_SPEED + Math.random() * (threshold75 - MIN_SPEED);
                }
            }
            // Phase 3 (800+): no restrictions

            logSpeed = newSpeed;
            logDirection = newDirection;
            updateDirectionUI();
        }

        function updateDirectionUI() {
            if (logDirection === 1) {
                statusEl.innerText = "КРУТИ ВЛЕВО";
                arrowEl.innerText = "←";
            } else {
                statusEl.innerText = "КРУТИ ВПРАВО";
                arrowEl.innerText = "→";
            }
            let speedPercent = Math.round(getSpeedPercent(logSpeed));
            speedEl.innerText = "Скорость: " + speedPercent + "%";
        }

        function updateHighScoreDisplay() {
            if (highScore > 0) {
                highScoreEl.innerText = "Рекорд: " + highScore;
                highScoreEl.style.display = 'block';
            } else {
                highScoreEl.style.display = 'none';
            }
        }

        // === NICKNAME SYSTEM ===

        function updatePlayerNameDisplay() {
            if (playerName) {
                playerNameEl.innerText = '👤 ' + playerName;
                playerNameEl.style.display = 'block';
            } else {
                playerNameEl.style.display = 'none';
            }
        }

        function showNicknameOverlay() {
            if (isPlaying) return;
            nicknameInput.value = playerName;
            nicknameOverlay.classList.add('active');
            setTimeout(() => nicknameInput.focus(), 100);
        }

        function saveNickname() {
            let name = nicknameInput.value.trim();
            if (!name) {
                nicknameInput.style.borderColor = '#ff6b6b';
                setTimeout(() => nicknameInput.style.borderColor = '', 1000);
                return;
            }
            playerName = name;
            localStorage.setItem('stayOnLog_playerName', playerName);
            nicknameOverlay.classList.remove('active');
            updatePlayerNameDisplay();
        }

        // Handle Enter key in nickname input
        document.getElementById('nickname-input').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') saveNickname();
        });

        // === GAME FLOW ===

        function handleStartClick() {
            if (!playerName) {
                showNicknameOverlay();
                // After saving nickname, auto-start
                const origSave = saveNickname;
                saveNickname = function () {
                    origSave();
                    if (playerName) {
                        saveNickname = origSave;
                        requestPermissionAndStart();
                    }
                };
                return;
            }
            requestPermissionAndStart();
        }

        function requestPermissionAndStart() {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(response => {
                        if (response === 'granted') {
                            showCountdown();
                        } else {
                            alert("Нужен доступ к датчикам, чтобы крутить бревно!");
                        }
                    })
                    .catch(console.error);
            } else {
                showCountdown();
            }
        }

        function showCountdown() {
            startBtn.style.display = 'none';
            arrowEl.style.display = 'none';
            speedEl.style.display = 'none';
            newRecordEl.style.display = 'none';
            statusEl.innerText = '';
            playerEl.classList.remove('visible', 'falling');
            playerEl.style.opacity = '0';

            // Hide falling player & splash from prev game — full reset
            fallingPlayerEl.classList.remove('active');
            fallingPlayerEl.removeAttribute('style');
            fallingPlayerEl.style.display = 'none';
            splashEl.classList.remove('active');
            splashEl.removeAttribute('style');
            splashEl.style.display = 'none';

            countdownOverlay.classList.add('active');

            window.addEventListener('devicemotion', handleMotion);

            // Reset
            logAngle = 0;
            userAngle = 0;
            smoothedDelta = 0;
            rawLastAngle = null;
            logSpeed = 0.8;
            logDirection = 1;
            logWrapper.style.transform = 'rotate(0deg)';
            orbitEl.style.transform = 'rotate(0deg)';

            let count = 3;
            countdownNumber.innerText = count;
            countdownNumber.style.animation = 'none';
            void countdownNumber.offsetWidth;
            countdownNumber.style.animation = 'countPop 0.5s ease-out';

            let interval = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownNumber.innerText = count;
                    countdownNumber.style.animation = 'none';
                    void countdownNumber.offsetWidth;
                    countdownNumber.style.animation = 'countPop 0.5s ease-out';
                } else {
                    clearInterval(interval);
                    countdownOverlay.classList.remove('active');

                    userAngle = 0;
                    smoothedDelta = 0;
                    rawLastAngle = null;

                    dropPlayer();
                }
            }, 1000);
        }

        function dropPlayer() {
            playerEl.classList.remove('visible', 'falling');
            playerEl.style.opacity = '0';

            requestAnimationFrame(() => {
                playerEl.classList.add('falling');

                playerEl.addEventListener('animationend', function onEnd() {
                    playerEl.removeEventListener('animationend', onEnd);
                    playerEl.classList.remove('falling');
                    playerEl.classList.add('visible');
                    playerEl.style.opacity = '';
                    playerEl.style.top = '-25px';
                    startGame();
                }, { once: true });
            });
        }

        function startGame() {
            isPlaying = true;
            startTime = Date.now();
            score = 0;

            arrowEl.style.display = 'block';
            speedEl.style.display = 'block';
            updateDirectionUI();
            scheduleNextChange();
            gameLoop();
        }

        function gameOver(normPos) {
            isPlaying = false;
            dirWarning.style.display = 'none';
            arrowEl.style.display = 'none';
            speedEl.style.display = 'none';
            window.removeEventListener('devicemotion', handleMotion);

            // Hide stickman on log
            playerEl.classList.remove('visible');
            playerEl.style.opacity = '0';

            // Save high score
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('stayOnLog_highScore', highScore);
                updateHighScoreDisplay();
            }
            newRecordEl.style.display = 'none';

            // === FALL ANIMATION ===
            animateFall(normPos);
        }

        function animateFall(normPos) {
            // Determine fall direction: positive normPos = fell to the right
            let fallDirection = normPos > 0 ? 1 : -1;

            // Get game container position
            let containerRect = gameContainer.getBoundingClientRect();
            let centerX = containerRect.left + containerRect.width / 2;
            let centerY = containerRect.top + containerRect.height / 2;

            // Calculate exact position based on angle
            // The player orbits at r=135 from center. normPos is angle in degrees.
            // 0 deg is top of log. 90 deg is right, -90 is left.
            // Adjust so 0 deg is pointing UP in standard math terms (which is -90 in JS Math)
            let rad = (normPos - 90) * (Math.PI / 180);
            let orbitRadius = 135; // This matches the SVG design
            let pX = centerX + Math.cos(rad) * orbitRadius;
            let pY = centerY + Math.sin(rad) * orbitRadius;

            // Adjust for player element bounds (44x55 px, origin is bottom center usually, 
            // but in CSS it's centered via negative margin or explicit offset.
            // In original code, startX = centerX - 22, startY = containerRect.top - 25
            // Radius 135 means containerRect.top is at Y-140. So Y-25 is actually radius+some.
            // Let's use the explicit calculated center and offset.
            let startX = pX - 22;
            let startY = pY - 27;

            // Water position
            let waterRect = waterContainer.getBoundingClientRect();
            let waterTop = waterRect.top + 30;

            // Full reset before animation
            fallingPlayerEl.classList.remove('active');
            fallingPlayerEl.removeAttribute('style');

            // Set initial position (no transition yet)
            fallingPlayerEl.style.position = 'fixed';
            fallingPlayerEl.style.display = 'block';
            fallingPlayerEl.style.left = startX + 'px';
            fallingPlayerEl.style.top = startY + 'px';
            fallingPlayerEl.style.opacity = '1';
            fallingPlayerEl.style.transform = 'rotate(0deg)';
            fallingPlayerEl.style.transition = 'none';

            // Double-rAF ensures the browser has painted the initial state
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    // Now apply transition and target values
                    fallingPlayerEl.style.transition = 'left 0.8s ease-in, top 0.8s ease-in, transform 0.8s ease-in, opacity 0.8s ease-in';
                    fallingPlayerEl.style.left = (startX + fallDirection * 120) + 'px';
                    fallingPlayerEl.style.top = waterTop + 'px';
                    fallingPlayerEl.style.transform = `rotate(${fallDirection * 180}deg)`;
                    fallingPlayerEl.style.opacity = '0.3';
                });
            });

            // Show splash when player hits water
            setTimeout(() => {
                splashEl.removeAttribute('style');
                splashEl.style.position = 'fixed';
                splashEl.style.left = (startX + fallDirection * 120 - 18) + 'px';
                splashEl.style.top = (waterTop - 30) + 'px';
                splashEl.style.display = 'block';
                splashEl.classList.remove('active');
                void splashEl.offsetWidth;
                splashEl.classList.add('active');
            }, 700);

            // Show results after animation
            setTimeout(() => {
                fallingPlayerEl.style.display = 'none';
                statusEl.innerText = "УПАЛ! Очки: " + score;
                if (score >= highScore) {
                    statusEl.innerText += " 🏆";
                }
                startBtn.style.display = 'inline-block';
                startBtn.innerText = "Попробовать снова";
            }, 1200);
        }
    </script>
