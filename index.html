<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Бревно Гринд</title>
    <style>
        body {
            background-color: #2c3e50;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Блокируем скролл */
            touch-action: none;
        }

        #ui-layer {
            position: absolute;
            top: 10%;
            text-align: center;
            z-index: 10;
            width: 100%;
        }

        h1 { margin: 0; font-size: 48px; }
        p { font-size: 18px; opacity: 0.8; }

        /* Игровой контейнер */
        #game-container {
            position: relative;
            width: 300px;
            height: 300px;
        }

        /* Бревно */
        #log {
            width: 250px;
            height: 250px;
            background-color: #8B4513; /* Коричневый */
            border-radius: 50%;
            position: absolute;
            top: 25px;
            left: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            /* Анимация вращения будет через JS */
        }

        /* Сердцевина бревна (светлая) */
        #log::after {
            content: '';
            width: 200px;
            height: 200px;
            background-color: #DEB887; /* Светло-коричневый */
            border-radius: 50%;
            position: absolute;
        }

        /* Линия доказательства вращения */
        #log-line {
            width: 100%;
            height: 4px;
            background-color: black;
            position: absolute;
            z-index: 2;
        }

        /* Контейнер игрока (вращается вокруг центра) */
        #player-orbit {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            /* z-index выше бревна */
            z-index: 5;
            transition: transform 0.1s linear; 
        }

        /* Сам персонаж */
        #player {
            width: 20px;
            height: 40px;
            background-color: #ff3b30;
            position: absolute;
            /* Ставим его на вершину орбиты */
            top: 5px; 
            left: 50%;
            transform: translateX(-50%);
            border: 2px solid white;
            border-radius: 4px;
        }

        #start-btn {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        #debug {
            position: absolute;
            bottom: 10px;
            font-size: 12px;
            opacity: 0.5;
            display: none; /* Включи если надо отладить углы */
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="score-display">Очки: 0</div>
        <div id="status-text">Нажми старт</div>
        <button id="start-btn" onclick="requestPermissionAndStart()">СТАРТ (iOS Требует)</button>
    </div>

    <div id="game-container">
        <!-- Бревно -->
        <div id="log">
            <div id="log-line"></div>
        </div>
        
        <!-- Орбита игрока (показывает его реальное положение) -->
        <div id="player-orbit">
            <div id="player"></div>
        </div>
    </div>

    <div id="debug">Debug info</div>

    <script>
        // --- ПЕРЕМЕННЫЕ ИГРЫ ---
        let isPlaying = false;
        let score = 0;
        let startTime = 0;
        
        // Физика
        let logAngle = 0; // Угол поворота бревна (растет постоянно)
        let logSpeed = 0.5; // Скорость вращения (градусов за кадр) - это МЕДЛЕННО для начала
        
        let userAngle = 0; // Накопленный угол поворота телефона
        let rawLastAngle = null; // Для развертки углов (чтобы не было скачка 360->0)
        let rotationOffset = 0; // Калибровка начального положения
        
        // DOM Элементы
        const logEl = document.getElementById('log');
        const orbitEl = document.getElementById('player-orbit');
        const scoreEl = document.getElementById('score-display');
        const statusEl = document.getElementById('status-text');
        const startBtn = document.getElementById('start-btn');
        const debugEl = document.getElementById('debug');

        // --- ГЛАВНЫЙ ЦИКЛ ИГРЫ ---
        function gameLoop() {
            if (!isPlaying) return;

            // 1. Вращаем бревно (По часовой)
            logAngle += logSpeed;
            logEl.style.transform = `rotate(${logAngle}deg)`;

            // 2. Считаем позицию игрока
            // Логика: Бревно уносит нас на logAngle. Мы компенсируем userAngle.
            // Если userAngle (отрицательный при вращении влево) равен -logAngle, мы в нуле.
            let playerPosition = logAngle + userAngle; 
            
            // Визуализируем позицию игрока
            orbitEl.style.transform = `rotate(${playerPosition}deg)`;

            // 3. Обновляем очки
            let now = Date.now();
            score = Math.floor((now - startTime) / 100); // 10 очков в секунду
            scoreEl.innerText = "Очки: " + score;

            // 4. Проверка проигрыша
            // Нормализуем угол, чтобы проверить отклонение от -90 до +90
            if (playerPosition > 90 || playerPosition < -90) {
                gameOver();
            }

            // Отладка
            // debugEl.innerText = `Log: ${logAngle.toFixed(0)} | User: ${userAngle.toFixed(0)} | Pos: ${playerPosition.toFixed(0)}`;

            requestAnimationFrame(gameLoop);
        }

        // --- ОБРАБОТКА ДАТЧИКОВ (МАТЕМАТИКА) ---
        function handleMotion(event) {
            // Используем акселерометр (гравитацию), чтобы понять, где низ
            let x = event.accelerationIncludingGravity.x;
            let y = event.accelerationIncludingGravity.y;

            // Вычисляем угол телефона (арктангенс)
            // atan2 возвращает радианы от -PI до PI
            let rad = Math.atan2(y, x);
            let deg = rad * (180 / Math.PI);

            // Корректировка ориентации: 
            // В браузере (x=0, y=9.8) это обычно 90 градусов.
            // Нам нужно, чтобы "вертикально вверх" было 0.
            // При стандартном портретном хвате y положительный, x около 0.
            
            // Смещаем фазу, чтобы вертикально было 0 (примерно)
            deg = deg - 90;

            // --- РАЗВЕРТКА УГЛА (UNWRAP) ---
            // Проблема: угол прыгает от 180 к -180. Нам нужно плавное число (360, 370...)
            if (rawLastAngle !== null) {
                let delta = deg - rawLastAngle;
                
                // Если скачок слишком большой (перешли границу круга)
                if (delta < -180) delta += 360;
                if (delta > 180) delta -= 360;

                // Накапливаем угол
                userAngle += delta;
            }
            
            rawLastAngle = deg;
        }

        // --- УПРАВЛЕНИЕ ИГРОЙ ---
        
        // Запрос разрешений для iOS 13+
        function requestPermissionAndStart() {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(response => {
                        if (response === 'granted') {
                            startCountdown();
                        } else {
                            alert("Нужен доступ к датчикам, чтобы крутить бревно!");
                        }
                    })
                    .catch(console.error);
            } else {
                // Для Android и старых iOS
                startCountdown();
            }
        }

        function startCountdown() {
            startBtn.style.display = 'none';
            let count = 3;
            statusEl.innerText = count;
            
            // Инициализация датчиков
            window.addEventListener('devicemotion', handleMotion);
            
            // Сброс переменных
            // Ждем первого чтения датчика, чтобы обнулить позицию
            setTimeout(() => {
                logAngle = 0;
                // Сбрасываем userAngle в 0 относительно текущего положения телефона
                // Чтобы игра начиналась с "0" независимо от того, как ты держишь телефон
                // Но для прототипа просто начнем считать изменения.
                userAngle = 0; 
                rawLastAngle = null; // Сброс трекинга
            }, 100);

            let interval = setInterval(() => {
                count--;
                if (count > 0) {
                    statusEl.innerText = count;
                } else {
                    clearInterval(interval);
                    statusEl.innerText = "КРУТИ!";
                    startGame();
                }
            }, 1000);
        }

        function startGame() {
            isPlaying = true;
            startTime = Date.now();
            gameLoop();
        }

        function gameOver() {
            isPlaying = false;
            statusEl.innerText = "УПАЛ! Очки: " + score;
            startBtn.style.display = 'inline-block';
            startBtn.innerText = "Попробовать снова";
            window.removeEventListener('devicemotion', handleMotion);
            
            // Визуальный эффект падения (просто оставляем как есть)
        }

    </script>
</body>
</html>
